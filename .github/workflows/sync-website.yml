name: Sync website

on:
  push:
    branches: [main]

jobs:
  sync-website:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website update
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: |
          if [ -z "$WEBSITE_REPO_TOKEN" ]; then
            echo "Missing WEBSITE_REPO_TOKEN secret. Create a fine-grained PAT with read/write access to Sam-Armstrong/sam-armstrong.github.io (Contents and Actions), then add it as a repository secret."
            exit 1
          fi

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $WEBSITE_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Sam-Armstrong/sam-armstrong.github.io/dispatches \
            -d "$(jq -n \
              --arg event_type "cv-updated" \
              --arg cv_ref "${{ github.sha }}" \
              --arg triggered_by "${{ github.repository }}" \
              '{event_type: $event_type, client_payload: {cv_ref: $cv_ref, triggered_by: $triggered_by}}')"
